<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #93f0f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .chat-container { background: rgb(116, 107, 113); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 680px; height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { background: #1a1a2e; color: rgb(248, 161, 224); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .chat-header h1 { font-size: 1.1rem; }
  .session-badge { background: rgba(226, 30, 30, 0.2); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; margin-left: auto; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .message { max-width: 80%; padding: 10px 14px; border-radius: 16px; line-height: 1.5; font-size: 0.9rem; white-space: pre-wrap; }
  .user { background: #1a1a2e; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .assistant { background: #f0f2f5; color: #1a1a2e; align-self: flex-start; border-bottom-left-radius: 4px; }
  .typing { display: none; align-self: flex-start; background: #f9a2f0; padding: 10px 16px; border-radius: 16px; border-bottom-left-radius: 4px; color: #666; font-size: 0.85rem; }
  .chat-input { display: flex; gap: 8px; padding: 16px; border-top: 1px solid #eee; }
  .chat-input input { flex: 1; border: 1px solid #ddd; border-radius: 24px; padding: 10px 16px; font-size: 0.9rem; outline: none; }
  .chat-input input:focus { border-color: #6c6ca9; }
  .chat-input button { background: #1a1a2e; color: rgb(246, 131, 210); border: none; border-radius: 24px; padding: 10px 20px; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
  .chat-input button:hover { opacity: 0.85; }
  .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <h1>Chatbot</h1>
    <span class="session-badge" id="session-label">loading...</span>
  </div>
  <div class="messages" id="messages">
    <div class="message assistant">Hey! How can I help you today?</div>
  </div>
  <div class="typing" id="typing">typing...</div>
  <div class="chat-input">
    <input type="text" id="input" placeholder="Type a message..." autofocus />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const sessionId = "session_" + Math.random().toString(36).slice(2, 9);
  document.getElementById("session-label").textContent = "ID: " + sessionId;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const typing = document.getElementById("typing");

  inputEl.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    sendBtn.disabled = true;
    addMessage(text, "user");
    typing.style.display = "block";
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await res.json();
      addMessage(data.reply || data.detail, "assistant");
    } catch (err) {
      addMessage("Error connecting to server.", "assistant");
    } finally {
      typing.style.display = "none";
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
